            date: "Oct 2024 - Present"
            content: |
              - Built and deployed a **RAG** platform using web crawlers, unstructured data processing, LangChain chunking, embeddings, and **OpenSearch** for semantic search.
              - Implemented context engineering, reranking, and guardrails to improve retrieval quality and reduce hallucinations.
              - Delivered **FastAPI** services with **Pydantic** validation for production API integration.
              - Ran **LLM evaluation** (e.g. RAGAS) with human-in-the-loop validation to improve relevance and answer quality.
              - Developed **serverless ETL** on **AWS Lambda** and **DynamoDB** ingesting **1TB+** Morningstar financial data daily for near real-time analytics across regions.

      - company: "Texas Advanced Computing Center (TACC)"
        companyUrl: "https://tacc.utexas.edu/"
        jobs:
