        - "RAG · vector DBs · OpenSearch · Elasticsearch · hybrid search"
        - "AWS · Lambda · DynamoDB · Docker · Kubernetes · Terraform · CI/CD"
        - "FastAPI · Pydantic · MLOps · LLM evaluation (e.g. RAGAS)"

