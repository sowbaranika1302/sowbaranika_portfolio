      Experienced **Data Scientist** and **AI Engineer** with expertise in machine learning, deep learning, cloud computing (**AWS**, Docker, Terraform), and AI deployment. I build scalable, low-latency systems—including **retrieval-augmented generation (RAG)** pipelines, computer vision, and time-series forecasting—and care about turning research into reliable production services.

      Currently a **Data Scientist at [Seemas AI](https://www.linkedin.com/company/seemas-ai)** in **Austin, TX**. M.S. Computer Science from **[The Ohio State University](https://www.osu.edu/)**; B.E. Computer Science from **PSG Institute of Technology and Applied Research**.

      **Phone:** [+1 614-629-7150](tel:+16146297150) · **Email:** [sowbaranika213@gmail.com](mailto:sowbaranika213@gmail.com)
    skills:
      enable: true
