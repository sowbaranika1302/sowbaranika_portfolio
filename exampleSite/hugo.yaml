            date: "Jun 2024 - Aug 2024"
            content: |
              - Developed edge-optimized ML models in **PyTorch** (~20% lower inference latency, ~15% lower memory) for resource-constrained IoT settings.
              - Helped design an event-driven simulation stack using **FlatBuffers**, **Python**, **Rust**, **Docker**, and **Kubernetes**.
              - Built a **React** dashboard for model configuration, monitoring, and benchmarking.

      - company: "The Ohio State University"
        companyUrl: "https://www.osu.edu/"
        jobs:
          - name: "AI Research Assistant"
            date: "Jun 2022 - May 2024"
            content: |
              - Fine-tuned **CNNs** and **Vision Transformers** on 110K+ camera-trap images; **~95% accuracy** for species recognition supporting ecological monitoring.
              - Integrated **YOLOv5** for detection preprocessing, cutting manual review ~**70%** and scaling throughput to **~5K images/day**.

      - company: "Bloomfilter"
        companyUrl: "https://www.linkedin.com/company/bloomfilter-inc"
        jobs:
          - name: "AI Software Engineer Intern"
            date: "May 2023 - Aug 2023"
            content: |
              - Built **SARIMA** time-series models to forecast sprint scope changes (**~92% accuracy**), supporting scope-risk visibility for engineering teams.
              - Implemented feature engineering and visualization pipelines for tree-structured data with **Django** and **React**.

      - company: "Epsilon"
        companyUrl: "https://www.linkedin.com/company/epsilon"
        jobs:
          - name: "Data Scientist"
            date: "Jan 2018 - Dec 2021"
            content: |
