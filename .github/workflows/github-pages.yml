# Build exampleSite/ and publish to GitHub Pages.
# Project site URL: https://sowbaranika1302.github.io/sowbaranika_portfolio/
# Repo: https://github.com/sowbaranika1302/sowbaranika_portfolio
# Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.143.0"
          extended: false

      - name: Build
        run: |
          cd exampleSite
          hugo --gc --minify --environment production -d ../public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
